<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOZP Portál — Ing. Ondřej Toman</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --navy: #1a2744; --navy-light: #243460; --gold: #c9a44e; --cream: #f7f4ef; --text: #1a1a1a; --text-muted: #5a5a6a; --danger: #c0392b; --success: #27ae60; --border: rgba(26,39,68,0.12); --radius: 10px; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
        #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); }
        .login-box { background: #fff; border-radius: 18px; padding: 3rem; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #app { display: none; }
        .topbar { background: var(--navy); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 60px; }
        .app-layout { display: flex; min-height: calc(100vh - 60px); }
        .sidebar { width: 220px; background: #fff; border-right: 1px solid var(--border); padding-top: 20px; }
        .nav-item { padding: 12px 20px; cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .nav-item.active { background: var(--navy); color: #fff; }
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .table-wrap { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background: #fafafa; font-weight: 600; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .btn-navy { background: var(--navy); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; font-size: 11px; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: #fff; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .field-group { margin-bottom: 12px; text-align: left; }
        .field-group label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; }
        .field-group input { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="margin-bottom:20px;">BOZP Portál</h2>
        <div class="field-group"><label>E-mail</label><input type="email" id="login-email"></div>
        <div class="field-group"><label>Heslo</label><input type="password" id="login-password"></div>
        <button class="btn btn-navy" style="width:100%" onclick="doLogin()">Vstoupit</button>
        <p style="margin-top:15px; font-size:12px;"><a href="#" onclick="handleForgotPassword()" style="color:var(--navy)">Zapomněli jste heslo?</a></p>
        <p id="login-msg" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="app">
    <div class="topbar">
        <div id="user-display">Administrace</div>
        <button onclick="logout()" style="background:none; border:1px solid #fff; color:#fff; padding:4px 8px; border-radius:4px; cursor:pointer">Odhlásit</button>
    </div>
    <div class="app-layout">
        <nav class="sidebar">
            <div class="nav-item active" id="nav-dashboard" onclick="showPage('dashboard')">📊 Přehled</div>
            <div class="nav-item" id="nav-klienti" onclick="showPage('klienti')">🏢 Klienti</div>
        </nav>
        <main class="main">
            <div id="page-dashboard">
                <h1>Aktuální přehled</h1>
                <div id="stats-grid" style="display:flex; gap:20px; margin-top:20px;"></div>
            </div>
            <div id="page-klienti" class="hidden">
                <div style="display:flex; justify-content:space-between;">
                    <h1>Správa klientů</h1>
                    <button class="btn btn-navy" id="add-btn-top" onclick="openModal()">+ Přidat firmu</button>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Firma / Adresa</th><th>IČO</th><th>E-mail / Tel.</th><th>Akce</th></tr></thead>
                        <tbody id="klienti-tbody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<div class="modal-overlay" id="add-modal">
    <div class="modal">
        <h3>Nová firma</h3><br>
        <form onsubmit="saveNewClient(event)">
            <div class="field-group"><label>Název firmy</label><input type="text" id="f-name" required></div>
            <div class="field-group"><label>IČO</label><input type="text" id="f-ico"></div>
            <div class="field-group"><label>E-mail</label><input type="email" id="f-email" required></div>
            <div class="field-group"><label>Telefon</label><input type="text" id="f-phone"></div>
            <div class="field-group"><label>Adresa</label><input type="text" id="f-address"></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button type="submit" class="btn btn-navy" id="save-btn">Uložit</button>
                <button type="button" class="btn" onclick="closeModal()">Zavřít</button>
            </div>
        </form>
    </div>
</div>

<script>
    const SCRIPT_URL = "TVOJE_URL_ADRESA_Z_GOOGLE_SCRIPTU";
    let CLIENTS = [], TASKS = [], USER_ROLE = "client";

    window.onload = () => {
        const saved = localStorage.getItem('bozp_auth');
        if (saved) {
            const auth = JSON.parse(saved);
            document.getElementById('login-email').value = auth.email;
            document.getElementById('login-password').value = auth.pass;
            doLogin();
        }
    };

    async function doLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-password').value;
        const msg = document.getElementById('login-msg');
        msg.innerText = "Ověřování...";

        try {
            const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "login", email: email, password: pass }) }).then(r => r.json());
            if (res.status === "success") {
                localStorage.setItem('bozp_auth', JSON.stringify({email, pass}));
                CLIENTS = res.clients; TASKS = res.tasks; USER_ROLE = res.role;
                if (USER_ROLE === "client") document.getElementById('nav-klienti').style.display = "none";
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                renderAll();
            } else if (res.status === "needs_reg") {
                const np = prompt("Nastavte si heslo:");
                if(np) await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "login", email, newPassword: np }) });
                location.reload();
            } else msg.innerText = res.msg;
        } catch(e) { msg.innerText = "Chyba připojení."; }
    }

    function renderAll() {
        // Render Klienti
        document.getElementById('klienti-tbody').innerHTML = CLIENTS.map(c => `
            <tr>
                <td><strong>${c.Firma}</strong><br><small>${c.Adresa || ''}</small></td>
                <td>${c.ICI || ''}</td>
                <td>${c.email}<br><small>${c.Telefon || ''}</small></td>
                <td><button class="btn btn-danger" onclick="deleteClient(${c.Id})">Smazat</button></td>
            </tr>
        `).join('');
        // Render Dashboard Stats
        document.getElementById('stats-grid').innerHTML = `<div style="background:#fff; padding:20px; border-radius:10px;"><h3>${CLIENTS.length}</h3><p>Klientů</p></div>`;
    }

    async function saveNewClient(e) {
        e.preventDefault();
        const btn = document.getElementById('save-btn');
        btn.disabled = true;
        const payload = {
            action: "addClient",
            name: document.getElementById('f-name').value,
            ico: document.getElementById('f-ico').value,
            email: document.getElementById('f-email').value,
            phone: document.getElementById('f-phone').value,
            address: document.getElementById('f-address').value
        };
        await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        alert("Firma přidána!");
        location.reload();
    }

    async function deleteClient(id) {
        if (!confirm("Opravdu smazat?")) return;
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "deleteClient", id: id }) });
        CLIENTS = CLIENTS.filter(c => c.Id != id);
        renderAll();
    }

    async function handleForgotPassword() {
        const email = document.getElementById('login-email').value;
        if(!email) return alert("Zadejte email");
        const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "forgotPassword", email }) }).then(r => r.json());
        if(res.status === "code_sent") {
            const code = prompt("Kód z emailu:");
            const newPass = prompt("Nové heslo:");
            if(code && newPass) {
                const res2 = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "resetPassword", email, code, newPassword: newPass }) }).then(r => r.json());
                if(res2.status === "success") alert("Heslo změněno!");
            }
        }
    }

    function showPage(id) {
        document.getElementById('page-dashboard').classList.add('hidden');
        document.getElementById('page-klienti').classList.add('hidden');
        document.getElementById('page-' + id).classList.remove('hidden');
    }
    function logout() { localStorage.removeItem('bozp_auth'); location.reload(); }
    function openModal() { document.getElementById('add-modal').classList.add('open'); }
    function closeModal() { document.getElementById('add-modal').classList.remove('open'); }
</script>
</body>
</html>
